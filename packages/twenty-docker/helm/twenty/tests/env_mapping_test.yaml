suite: env mapping
templates:
  - templates/deployment-server.yaml
  - templates/deployment-worker.yaml
release:
  name: my-twenty
  namespace: default
tests:
  - it: renders server extraEnv with plain value
    template: templates/deployment-server.yaml
    set:
      server.extraEnv:
        - name: FEATURE_X_ENABLED
          value: "true"
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: FEATURE_X_ENABLED
            value: "true"

  - it: renders server extraEnv with valueFrom
    template: templates/deployment-server.yaml
    set:
      server.extraEnv:
        - name: SMTP_PASSWORD
          valueFrom:
            secretKeyRef:
              name: smtp-creds
              key: password
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: SMTP_PASSWORD
            valueFrom:
              secretKeyRef:
                name: smtp-creds
                key: password

  - it: renders worker extraEnv with valueFrom
    template: templates/deployment-worker.yaml
    set:
      worker.extraEnv:
        - name: CUSTOM_SECRET
          valueFrom:
            secretKeyRef:
              name: my-secret
              key: custom
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: CUSTOM_SECRET
            valueFrom:
              secretKeyRef:
                name: my-secret
                key: custom

  - it: renders additional server env values from server.env
    template: templates/deployment-server.yaml
    set:
      server.env.FRONTEND_URL: https://crm.example.com
      server.env.IS_MULTIWORKSPACE_ENABLED: "true"
      server.env.DEFAULT_SUBDOMAIN: app
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: FRONTEND_URL
            value: "https://crm.example.com"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: IS_MULTIWORKSPACE_ENABLED
            value: "true"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DEFAULT_SUBDOMAIN
            value: "app"

  - it: renders additional worker env values from worker.env
    template: templates/deployment-worker.yaml
    set:
      worker.env.FRONTEND_URL: https://crm.example.com
      worker.env.IS_MULTIWORKSPACE_ENABLED: "true"
      worker.env.DEFAULT_SUBDOMAIN: app
    asserts:
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: FRONTEND_URL
            value: "https://crm.example.com"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: IS_MULTIWORKSPACE_ENABLED
            value: "true"
      - contains:
          path: spec.template.spec.containers[0].env
          content:
            name: DEFAULT_SUBDOMAIN
            value: "app"
